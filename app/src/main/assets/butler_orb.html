<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Butler</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #07111F;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
  }

  .ui {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 52px;
    pointer-events: none;
  }

  .spoken {
    font-family: Georgia, 'Noto Serif', serif;
    font-style: italic;
    font-size: clamp(16px, 3.8vw, 22px);
    color: rgba(220, 235, 255, 0.92);
    text-align: center;
    max-width: 78%;
    line-height: 1.6;
    letter-spacing: 0.01em;
    min-height: 56px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .spoken.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .spoken { transition: none; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <p class="spoken" id="spoken"></p>
</div>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const spoken = document.getElementById('spoken');

  // ── Resize ─────────────────────────────────────────────────────────────────
  let W, H, CX, CY;
  function resize() {
    W  = canvas.width  = window.innerWidth;
    H  = canvas.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2 - H * 0.04;   // orb sits slightly above centre
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Colour palettes ─────────────────────────────────────────────────────────
  // Each state has [r,g,b] core colour + halo colour
  const PALETTES = {
    idle:      { core: [201, 162,  75], halo: [201, 162,  75] },  // palace gold
    listening: { core: [ 47, 128, 237], halo: [ 80, 160, 255] },  // butler blue
    thinking:  { core: [230, 140,  30], halo: [240, 180,  60] },  // amber
    speaking:  { core: [ 80, 180, 255], halo: [120, 210, 255] },  // sky-blue voice
  };

  // ── State machine ───────────────────────────────────────────────────────────
  let state      = 'idle';
  let prevState  = 'idle';
  let transition = 1;          // 0 = just switched, 1 = fully settled
  let stateT     = 0;          // frames since last state change

  // Smoothly interpolated render colour (RGB lerp each frame)
  let liveCore = [...PALETTES.idle.core];
  let liveHalo = [...PALETTES.idle.halo];

  function lerpRGB(a, b, t) {
    return [
      a[0] + (b[0] - a[0]) * t,
      a[1] + (b[1] - a[1]) * t,
      a[2] + (b[2] - a[2]) * t,
    ];
  }

  // ── Particles (idle & speaking ember drift) ──────────────────────────────
  const NUM_P = 55;
  const particles = [];

  function orbR() { return Math.min(W, H) * 0.21; }

  function makeParticle(burst) {
    const a  = Math.random() * Math.PI * 2;
    const r  = orbR() * (0.85 + Math.random() * 0.5);
    return {
      x:    CX + Math.cos(a) * r,
      y:    CY + Math.sin(a) * r,
      vx:   (Math.random() - 0.5) * 0.45,
      vy:   -(0.25 + Math.random() * 0.55),
      life: burst ? 0 : Math.random() * 200,
      max:  130 + Math.random() * 170,
      size: 1.2 + Math.random() * 2.0,
    };
  }

  for (let i = 0; i < NUM_P; i++) particles.push(makeParticle(false));

  function tickParticles() {
    particles.forEach(p => {
      p.life++;
      p.x += p.vx;
      p.y += p.vy;
      if (p.life >= p.max) {
        const fresh = makeParticle(true);
        Object.assign(p, fresh);
      }
    });
  }

  function drawParticles() {
    const [r, g, b] = liveCore;
    particles.forEach(p => {
      const t     = p.life / p.max;
      const alpha = (t < 0.2 ? t / 0.2 : t > 0.72 ? (1 - t) / 0.28 : 1) * 0.55;
      const sz    = p.size * (1 - t * 0.45);
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(3)})`;
      ctx.fill();
    });
  }

  // ── Ripple rings (listening) ──────────────────────────────────────────────
  const ripples = [];
  let rippleTimer = 0;

  function spawnRipple() {
    ripples.push({ r: orbR() * 0.88, alpha: 0.72 });
  }

  function tickRipples() {
    rippleTimer++;
    if (state === 'listening' && rippleTimer % 36 === 0) spawnRipple();
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r    += 3.2;
      rp.alpha -= 0.013;
      if (rp.alpha <= 0) ripples.splice(i, 1);
    }
  }

  function drawRipples() {
    const [r, g, b] = liveCore;
    ripples.forEach(rp => {
      ctx.beginPath();
      ctx.arc(CX, CY, rp.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${rp.alpha.toFixed(3)})`;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    });
  }

  // ── Wave bars (speaking) ─────────────────────────────────────────────────
  const NUM_BARS = 36;
  const bars     = Array.from({ length: NUM_BARS }, () => ({ h: 0.15, target: 0.15 }));
  let barTimer   = 0;

  function tickBars() {
    barTimer++;
    if (state === 'speaking' && barTimer % 5 === 0) {
      // make bars animate in a wave + random pattern
      bars.forEach((bar, i) => {
        bar.target = 0.12 + Math.random() * 0.88;
      });
    }
    bars.forEach(bar => {
      bar.h += (bar.target - bar.h) * 0.18;
    });
  }

  function drawBars() {
    const R     = orbR();
    const [r, g, b] = liveCore;
    const barW  = (R * 2.0) / NUM_BARS;
    const sx    = CX - R;
    const baseY = CY + R * 1.52;
    const maxH  = R * 0.52;

    bars.forEach((bar, i) => {
      const x  = sx + i * barW;
      const bh = Math.max(3, bar.h * maxH);
      const alpha = 0.35 + bar.h * 0.65;
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(3)})`;
      ctx.beginPath();
      const rr = Math.min(2, barW * 0.4);
      ctx.roundRect(x + 1, baseY - bh / 2, barW - 2, bh, rr);
      ctx.fill();
    });
  }

  // ── Thinking orbit ────────────────────────────────────────────────────────
  const ORBIT_DOTS = [
    { angle: 0,                  speed: 0.028, dist: 1.52 },
    { angle: (Math.PI * 2) / 3,  speed: 0.020, dist: 1.68 },
    { angle: (Math.PI * 4) / 3,  speed: 0.024, dist: 1.42 },
  ];

  function tickOrbit() {
    ORBIT_DOTS.forEach(d => { d.angle += d.speed; });
  }

  function drawOrbit() {
    const R = orbR();
    const [r, g, b] = liveCore;

    // elliptical ring
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(CX, CY, R * 1.6, R * 0.44, stateT * 0.012, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},0.22)`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
    ctx.restore();

    // dots
    ORBIT_DOTS.forEach(d => {
      const dx = CX + Math.cos(d.angle) * R * d.dist;
      const dy = CY + Math.sin(d.angle) * R * 0.40;
      const grd = ctx.createRadialGradient(dx, dy, 0, dx, dy, 7);
      grd.addColorStop(0, `rgba(255,255,255,0.92)`);
      grd.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(dx, dy, 7, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ── Morphing orb contour ─────────────────────────────────────────────────
  // The "aesthetic risk": the orb edge is not a perfect circle —
  // two layers of standing sine waves deform it subtly. Amplitude scales
  // per state, so idle is near-circular while listening pulses organically.
  function orbPath(R, morphAmp, t) {
    const pts = 120;
    ctx.beginPath();
    for (let i = 0; i <= pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const d = R * (1
        + Math.sin(a * 3 + t * 0.025) * morphAmp * 0.55
        + Math.sin(a * 5 - t * 0.018) * morphAmp * 0.30
        + Math.sin(a * 7 + t * 0.033) * morphAmp * 0.15
      );
      const x = CX + Math.cos(a) * d;
      const y = CY + Math.sin(a) * d;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  // ── Main draw loop ─────────────────────────────────────────────────────────
  let t = 0;

  function frame() {
    requestAnimationFrame(frame);
    t++;
    stateT++;

    // ── tick
    tickParticles();
    tickRipples();
    tickBars();
    if (state === 'thinking') tickOrbit();

    // ── smooth colour lerp toward target palette
    const tc = PALETTES[state] || PALETTES.idle;
    liveCore = lerpRGB(liveCore, tc.core, 0.05);
    liveHalo = lerpRGB(liveHalo, tc.halo, 0.05);

    const [cr, cg, cb] = liveCore;
    const [hr, hg, hb] = liveHalo;
    const R = orbR();

    // ── morph amplitude: 0 = perfect circle
    const morphAmp = {
      idle:      0.022,
      listening: 0.068,
      thinking:  0.030,
      speaking:  0.055,
    }[state] ?? 0.022;

    // ── breathe scale
    const breatheSpeed = { idle: 0.016, listening: 0.055, thinking: 0.028, speaking: 0.048 }[state] ?? 0.016;
    const breatheAmt   = { idle: 0.055, listening: 0.040, thinking: 0.028, speaking: 0.075 }[state] ?? 0.055;
    const breathe      = 1 + Math.sin(t * breatheSpeed) * breatheAmt;

    // ── clear
    ctx.clearRect(0, 0, W, H);

    // ── background ambient corona
    const corona = ctx.createRadialGradient(CX, CY, 0, CX, CY, R * 3.2);
    corona.addColorStop(0,   `rgba(${hr|0},${hg|0},${hb|0},0.09)`);
    corona.addColorStop(0.5, `rgba(${hr|0},${hg|0},${hb|0},0.03)`);
    corona.addColorStop(1,   `rgba(0,0,0,0)`);
    ctx.fillStyle = corona;
    ctx.fillRect(0, 0, W, H);

    // ── state-specific underlays (before orb)
    if (state === 'listening') drawRipples();
    if (state === 'speaking')  drawBars();

    // ── outer glow halo
    const haloR = R * 1.6 * breathe;
    const haloGrad = ctx.createRadialGradient(CX, CY, R * 0.55, CX, CY, haloR);
    haloGrad.addColorStop(0,   `rgba(${hr|0},${hg|0},${hb|0},0.22)`);
    haloGrad.addColorStop(0.6, `rgba(${hr|0},${hg|0},${hb|0},0.08)`);
    haloGrad.addColorStop(1,   `rgba(0,0,0,0)`);
    ctx.save();
    orbPath(R * 1.6 * breathe, morphAmp * 0.5, t);
    ctx.fillStyle = haloGrad;
    ctx.fill();
    ctx.restore();

    // ── mid orb body
    const Rm = R * breathe;
    const midGrad = ctx.createRadialGradient(CX, CY, R * 0.2, CX, CY, Rm);
    midGrad.addColorStop(0,   `rgba(${cr|0},${cg|0},${cb|0},0.82)`);
    midGrad.addColorStop(0.6, `rgba(${cr|0},${cg|0},${cb|0},0.45)`);
    midGrad.addColorStop(1,   `rgba(${cr|0},${cg|0},${cb|0},0)`);
    ctx.save();
    orbPath(Rm, morphAmp, t);
    ctx.fillStyle = midGrad;
    ctx.fill();
    ctx.restore();

    // ── inner core (bright)
    const Rc = R * 0.68 * breathe;
    const coreGrad = ctx.createRadialGradient(
      CX - R * 0.14, CY - R * 0.14, 0,
      CX, CY, Rc
    );
    coreGrad.addColorStop(0,   `rgba(255,255,255,0.96)`);
    coreGrad.addColorStop(0.2, `rgba(${cr|0},${cg|0},${cb|0},0.95)`);
    coreGrad.addColorStop(0.75,`rgba(${cr|0},${cg|0},${cb|0},0.55)`);
    coreGrad.addColorStop(1,   `rgba(${cr|0},${cg|0},${cb|0},0)`);
    ctx.save();
    orbPath(Rc, morphAmp * 0.6, t);
    ctx.fillStyle = coreGrad;
    ctx.fill();
    ctx.restore();

    // ── specular highlight (liquid-glass look)
    const sx = CX - R * 0.26, sy = CY - R * 0.26;
    const specGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, R * 0.42);
    specGrad.addColorStop(0,   'rgba(255,255,255,0.58)');
    specGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    specGrad.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.save();
    orbPath(Rc, morphAmp * 0.6, t);
    ctx.fillStyle = specGrad;
    ctx.fill();
    ctx.restore();

    // ── thinking orbit on top of orb
    if (state === 'thinking') drawOrbit();

    // ── particles
    if (state === 'idle' || state === 'speaking') drawParticles();
  }

  // ── Public API ─────────────────────────────────────────────────────────────
  window.setOrbState = function (newState, text) {
    const valid = ['idle', 'listening', 'thinking', 'speaking'];
    if (!valid.includes(newState)) return;

    prevState = state;
    state     = newState;
    stateT    = 0;

    // clear ripples when leaving listening
    if (newState !== 'listening') ripples.length = 0;

    // reset bar targets when leaving speaking
    if (newState !== 'speaking') {
      bars.forEach(b => { b.target = 0.15; });
    }

    // spoken text
    if (newState === 'speaking' && text && text.trim().length > 0) {
      spoken.textContent = text.trim();
      spoken.classList.add('show');
    } else {
      spoken.classList.remove('show');
      // clear text after fade
      setTimeout(() => {
        if (!spoken.classList.contains('show')) spoken.textContent = '';
      }, 500);
    }
  };

  // kick off
  frame();
}());
</script>
</body>
</html>
